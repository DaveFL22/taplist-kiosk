<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
#<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StarBase Brewing Taplist</title>
<style>
  html {
    color-scheme: light !important;
    forced-color-adjust: none !important;
  }
  body {
    margin: 40px;
    font-family: Arial, Helvetica, sans-serif;
    color: #eee;
    overflow: hidden;
    background: radial-gradient(circle at 50% 20%, #050016, #000010 60%, #000008 100%);
    position: relative;
  }
  /* ⭐ Fullscreen canvas behind everything */
  #starfield {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 0;
  }
  /* ⭐ Content sits above starfield */
  .content {
    position: relative;
    z-index: 1;
    transform-origin: top center;
    transition: transform 0.4s ease-out;
  }
  /* ⭐ COSMIC LOGO */
  .cosmic-logo {
    font-weight: 900;
    text-align: center;
    text-transform: uppercase;
    font-size: 64px;
    letter-spacing: 16px;
    margin-bottom: 50px;
    color: #ffffff;
    text-shadow:
      0 0 10px #66aaff,
      0 0 20px #3388ff,
      0 0 32px #3366ff,
      0 0 48px #6633ff,
      0 0 70px #5511ff;
  }
  .cosmic-logo .sub {
    display: block;
    font-size: 0.58em;
    letter-spacing: 14px;
    margin-top: 10px;
    text-shadow:
      0 0 8px #66aaff,
      0 0 16px #3388ff,
      0 0 26px #6633ff;
  }
  h2 {
    display: inline-block;
    background: rgba(240,240,240,0.9);
    color: #000;
    padding: 6px 14px;
    border-radius: 6px;
    margin: 0 0 20px 0;
    box-shadow: 0 0 10px rgba(0,0,0,0.35);
    font-size: 30px;
  }
  .divider {
    width: 50%;
    height: 6px;
    margin: 90px auto 60px auto;
    background: linear-gradient(to right, #b8860b, #ffd700, #b8860b);
    border-radius: 6px;
    box-shadow:
      0 0 12px rgba(255, 215, 0, 0.7),
      0 0 24px rgba(255, 215, 0, 0.5),
      0 0 36px rgba(255, 215, 0, 0.3);
  }
  @keyframes neonMoodyFlicker {
    0% { opacity: 1; text-shadow: 0 0 6px #00ff66, 0 0 12px #00ff66; }
    20% { opacity: 0.75; text-shadow: 0 0 4px #00ff66; }
    35% { opacity: 0.55; text-shadow: 0 0 2px #00ff66; }
    50% { opacity: 0.7; text-shadow: 0 0 4px #00ff66; }
    70% { opacity: 1; text-shadow: 0 0 10px #00ff66, 0 0 20px #00ff66; }
    100% { opacity: 1; text-shadow: 0 0 8px #00ff66, 0 0 16px #00ff66; }
  }
  .neon-green {
    color: #009933;
    text-shadow:
      0 0 6px #00ff66,
      0 0 12px #00ff66;
    animation: neonMoodyFlicker 4.5s ease-in-out infinite;
  }
  .beer {
    margin: 25px 0;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 15px;
    border-radius: 10px;
    border: 2px solid rgba(255, 255, 255, 0.35);
    box-shadow:
      0 0 10px rgba(255, 255, 255, 0.25),
      inset 0 0 8px rgba(255, 255, 255, 0.25);
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(4px);
  }
  .beer-icon {
    width: 80px;
    height: 80px;
    object-fit: contain;
    border-radius: 6px;
    background: #222;
    padding: 6px;
  }
  .beer-text {
    display: flex;
    flex-direction: column;
    width: 55ch;
  }
  .beer-name {
    font-size: 30px;
    font-weight: bold;
    color: #fff;
  }
  .beer-details {
    font-size: 22px;
    color: #f5f5f5;
    font-weight: bold;
  }
  .beer-notes {
    font-size: 24px;
    color: #f5f5f5;
    font-style: italic;
    font-weight: bold;
    white-space: normal;
  }
  #timestamp {
    margin-top: 30px;
    font-size: 18px;
    color: #ccc;
    text-align: center;
  }
  #refreshIndicator {
    text-align: center;
    font-size: 16px;
    color: #f1c40f;
    opacity: 0;
    transition: opacity 0.5s;
  }

  /* Fade animation for refresh - SLOWER */
  #liveTaps, #comingSoon {
    transition: opacity 0.6s ease-in-out;
  }
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="content">
  <h1 class="cosmic-logo">
    STARBASE
    <span class="sub">BREWING</span>
  </h1>
  <h2 class="neon-green">NOW POURING · AHORA SIRVIENDO</h2>
  <div id="liveTaps">Loading…</div>
  <div class="divider"></div>
  <h2>COMING SOON · PRÓXIMAMENTE</h2>
  <div id="comingSoon">Loading…</div>
  <div id="refreshIndicator">Refreshing…</div>
  <div id="timestamp"></div>
</div>

<script>
/* ⭐ CINEMATIC SCI-FI STARFIELD WITH SUPERNOVAS + REALISTIC METEORS */
(function() {
  const canvas = document.getElementById("starfield");
  const ctx = canvas.getContext("2d");
  let width, height, stars = [];
  const layers = [
    { count: 260, speed: 0.03, size: 1.0, alpha: 0.5 },
    { count: 200, speed: 0.06, size: 1.4, alpha: 0.7 },
    { count: 140, speed: 0.10, size: 1.8, alpha: 1.0 }
  ];
  const palette = [
    [220, 230, 255],
    [180, 200, 255],
    [255, 220, 255],
    [200, 255, 255],
    [255, 240, 200]
  ];
  let meteors = [];
  const meteorChancePerFrame = 0.002;

  function spawnMeteor() {
    const startX = Math.random() * width;
    const startY = -20;
    const speed = 12 + Math.random() * 6;
    const angle = Math.PI / 3 + (Math.random() - 0.5) * 0.2;
    meteors.push({
      x: startX,
      y: startY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0,
      maxLife: 25 + Math.random() * 10
    });
  }

  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    initStars();
  }

  function initStars() {
    stars = [];
    layers.forEach((layer, layerIndex) => {
      for (let i = 0; i < layer.count; i++) {
        const band = Math.random();
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          layer: layerIndex,
          twinklePhase: Math.random() * Math.PI * 2,
          twinkleSpeed: 0.5 + Math.random() * 1.0,
          bandBias: band
        });
      }
    });
  }

  function drawMilkyWay() {
    const gradient = ctx.createLinearGradient(0, 0, width, height);
    gradient.addColorStop(0.2, "rgba(120,120,200,0.0)");
    gradient.addColorStop(0.4, "rgba(180,160,255,0.20)");
    gradient.addColorStop(0.5, "rgba(220,180,255,0.32)");
    gradient.addColorStop(0.6, "rgba(140,100,220,0.18)");
    gradient.addColorStop(0.8, "rgba(80,80,160,0.0)");
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, width, height);
    ctx.restore();
  }

  function drawMeteors() {
    if (Math.random() < meteorChancePerFrame) spawnMeteor();
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    ctx.lineWidth = 1.2;
    ctx.lineCap = "round";
    meteors = meteors.filter(m => m.life < m.maxLife);
    meteors.forEach(m => {
      m.x += m.vx;
      m.y += m.vy;
      m.life++;
      const t = m.life / m.maxLife;
      const alpha = 1 - t;
      const tailLength = 40;
      const tailX = m.x - m.vx * (tailLength / Math.hypot(m.vx, m.vy));
      const tailY = m.y - m.vy * (tailLength / Math.hypot(m.vx, m.vy));
      const grad = ctx.createLinearGradient(m.x, m.y, tailX, tailY);
      grad.addColorStop(0, `rgba(230,240,255,${alpha})`);
      grad.addColorStop(1, `rgba(230,240,255,0)`);
      ctx.strokeStyle = grad;
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(tailX, tailY);
      ctx.stroke();
    });
    ctx.restore();
  }

  function render(time) {
    ctx.clearRect(0, 0, width, height);
    const nebulaGrad = ctx.createRadialGradient(width * 0.6, height * 0.2, 0, width * 0.6, height * 0.2, width * 0.7);
    nebulaGrad.addColorStop(0, "rgba(80,0,150,0.45)");
    nebulaGrad.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = nebulaGrad;
    ctx.fillRect(0, 0, width, height);
    drawMilkyWay();

    stars.forEach(star => {
      const layer = layers[star.layer];
      star.x -= layer.speed;
      star.y += layer.speed;
      if (star.x < -50) star.x = width + 50;
      if (star.y > height + 50) star.y = -50;

      const baseAlpha = layer.alpha * (0.4 + star.bandBias * 0.6);
      const twinkle = 0.5 + 0.5 * Math.sin(star.twinklePhase + time * 0.001 * star.twinkleSpeed);
      let supernovaBoost = 1;
      if (Math.random() < 0.0008) supernovaBoost = 4 + Math.random() * 3;

      const alpha = baseAlpha * twinkle * supernovaBoost;
      const c = palette[Math.floor(star.bandBias * palette.length)];
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.fillStyle = `rgba(${c[0]}, ${c[1]}, ${c[2]}, ${alpha})`;
      const sizeBase = layer.size * (0.7 + star.bandBias * 0.8);
      const size = supernovaBoost > 1 ? sizeBase * 2.5 : sizeBase;
      ctx.beginPath();
      ctx.arc(star.x, star.y, size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
    drawMeteors();
    requestAnimationFrame(render);
  }

  window.addEventListener("resize", resize);
  resize();
  requestAnimationFrame(render);
})();

/* ⭐ AUTOMATIC SCALING FOR DIFFERENT MONITOR SIZES + DPI SCALING */
(function() {
    const content = document.querySelector('.content');
    const baseWidth = 4500;

    function updateScale() {
        const viewportWidth = window.innerWidth;
        const dpr = window.devicePixelRatio || 1;
        let scale = viewportWidth / baseWidth;
        scale = Math.max(0.75, Math.min(scale, 2.2));

        content.style.transform = `scale(${scale})`;

        if (scale > 1.4) {
            document.body.style.margin = `${Math.round(40 * scale)}px`;
        } else {
            document.body.style.margin = '40px';
        }
    }

    window.addEventListener('resize', updateScale);
    window.addEventListener('load', updateScale);

    if (window.matchMedia) {
        const mql = window.matchMedia(`(resolution: ${window.devicePixelRatio}dppx)`);
        mql.addEventListener('change', updateScale);
    }
})();

/* ⭐ TAPLIST LOGIC WITH SLOWER FADE ON REFRESH */
const sheetID = "1zZ_WGhm7bKx3hN1t4K_9OrmO3qoXFIo9d25tu4GNYW0";
const liveURL = `https://opensheet.elk.sh/${sheetID}/LiveTaps`;
const soonURL = `https://opensheet.elk.sh/${sheetID}/ComingSoon`;

function getStyleColor(style) {
  if (!style) return "#333";
  const s = style.toLowerCase();
  if (s.includes("neipa") || s.includes("new england")) return "rgba(246,200,138,0.85)";
  if (s.includes("ipa")) return "rgba(240,169,92,0.85)";
  if (s.includes("pale")) return "rgba(244,194,106,0.85)";
  if (s.includes("lager") || s.includes("larger")) return "rgba(247,217,124,0.85)";
  if (s.includes("pils")) return "rgba(249,231,168,0.85)";
  if (s.includes("bitter")) return "rgba(217,139,139,0.85)";
  if (s.includes("porter")) return "rgba(122,90,90,0.85)";
  if (s.includes("stout")) return "rgba(68,68,68,0.85)";
  if (s.includes("wheat")) return "rgba(249,231,168,0.85)";
  return "rgba(204,204,204,0.85)";
}

function updateTimestamp() {
  const now = new Date();
  document.getElementById("timestamp").innerText = "Last updated: " + now.toLocaleString();
}

function showRefreshIndicator() {
  const indicator = document.getElementById("refreshIndicator");
  indicator.style.opacity = 1;
  setTimeout(() => indicator.style.opacity = 0, 2000);
}

function fadeOutAndRefresh() {
  const liveContainer = document.getElementById("liveTaps");
  const soonContainer = document.getElementById("comingSoon");

  // Fade out
  liveContainer.style.opacity = "0";
  soonContainer.style.opacity = "0";

  setTimeout(() => {
    showRefreshIndicator();

    fetch(liveURL)
      .then(r => r.json())
      .then(data => {
        liveContainer.innerHTML = "";
        data
          .filter(row => row.Status && row.Status.trim().toLowerCase() === "on tap")
          .sort((a, b) => Number(a.Tap) - Number(b.Tap))
          .forEach(row => liveContainer.appendChild(createBeerElement(row, true)));
        liveContainer.style.opacity = "1";
      });

    fetch(soonURL)
      .then(r => r.json())
      .then(data => {
        soonContainer.innerHTML = "";
        data.forEach(row => soonContainer.appendChild(createBeerElement(row, false)));
        soonContainer.style.opacity = "1";
      });

    updateTimestamp();
  }, 600); // Slower fade (600ms)
}

function createBeerElement(row, includeTapNumber = false) {
  const beer = document.createElement("div");
  beer.className = "beer";
  beer.style.background = getStyleColor(row.Style);
  if (row.IconURL && row.IconURL.trim() !== "") {
    const icon = document.createElement("img");
    icon.className = "beer-icon";
    icon.src = row.IconURL.trim();
    beer.appendChild(icon);
  }
  const textWrap = document.createElement("div");
  textWrap.className = "beer-text";
  const name = document.createElement("div");
  name.className = "beer-name";
  name.innerText = includeTapNumber ? `${row.Tap}. ${row.BeerName}` : row.BeerName;
  textWrap.appendChild(name);
  const style = row.Style?.trim() || "";
  const abv = row.ABV?.trim() || "";
  let detailsText = "";
  if (style && abv) detailsText = `${style} · ${abv}%`;
  else if (style) detailsText = style;
  else if (abv) detailsText = `${abv}%`;
  if (detailsText) {
    const details = document.createElement("div");
    details.className = "beer-details";
    details.innerText = detailsText;
    textWrap.appendChild(details);
  }
  beer.appendChild(textWrap);
  if (row.Notes && row.Notes.trim() !== "") {
    const notesDiv = document.createElement("div");
    notesDiv.className = "beer-notes";
    notesDiv.innerText = row.Notes.trim();
    beer.appendChild(notesDiv);
  }
  return beer;
}

// Initial load (no fade)
function loadData() {
  const liveContainer = document.getElementById("liveTaps");
  const soonContainer = document.getElementById("comingSoon");

  fetch(liveURL)
    .then(r => r.json())
    .then(data => {
      liveContainer.innerHTML = "";
      data
        .filter(row => row.Status && row.Status.trim().toLowerCase() === "on tap")
        .sort((a, b) => Number(a.Tap) - Number(b.Tap))
        .forEach(row => liveContainer.appendChild(createBeerElement(row, true)));
      liveContainer.style.opacity = "1";
    });

  fetch(soonURL)
    .then(r => r.json())
    .then(data => {
      soonContainer.innerHTML = "";
      data.forEach(row => soonContainer.appendChild(createBeerElement(row, false)));
      soonContainer.style.opacity = "1";
    });

  updateTimestamp();
}

loadData();
setInterval(fadeOutAndRefresh, 300000);
</script>
</body>
</html>
